<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:linear-gradient(90deg,#ffffff,#eef2f7,#ffffff);
}

/* HEADER SAME */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 40px;
background:linear-gradient(90deg,#ffffff,#1e3a8a,#334155);

position:sticky;
top:0;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{height:75px;}

.logo span{
color:white;
font-size:18px;
}

/* TITLE */
.brand-title{
text-align:center;
font-size:44px;
margin:25px 0;
font-weight:700;
color:#0f172a;
}

/* BRAND LOGO */
.brand-logo{
text-align:center;
margin:25px 0;
}

.brand-logo img{
height:90px;
background:white;
padding:8px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* GRID (FEWER ITEMS = BIG DISPLAY) */
.grid, .grid-2{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
padding:20px 40px;
}

/* 🔥 BIG SHOWROOM CARD (IMPORTANT PART) */
.product,
.product,
.product2,
.product3{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
transition:0.3s;
display:flex;
flex-direction:column;
}

/* hover */
.product:hover,
.product:hover,
.product2:hover,
.product3:hover{
transform:scale(1.03);
}

/* 🔥 BIG IMAGE (SHOW FULL SET CLEARLY) */
.product img,
.product img,
.product2 img,
.product3 img{
width:100%;
height:320px;          /* BIG DISPLAY */
object-fit:contain;    /* SHOW FULL SET */
background:#f8fafc;
padding:15px;
}

/* TEXT */
.product p,
.product p,
.product2 p,
.product3 p{
font-size:16px;
font-weight:600;
margin:8px;
text-align:center;
color:#111;
}

/* PRICE */
.price{
color:#e11d48;
font-size:16px;
font-weight:bold;
text-align:center;
}

/* BUTTON */
.product button,
.product button,
.product2 button,
.product3 button{
margin-top:auto;
background:linear-gradient(45deg,#0ea5e9,#1e3a8a);
color:white;
border:none;
padding:12px;
width:100%;
font-size:15px;
cursor:pointer;
font-weight:600;
}

.product button:hover,
.product button:hover,
.product2 button:hover,
.product3 button:hover{
background:linear-gradient(45deg,#0284c7,#1e40af);
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
justify-content:center;
align-items:center;
z-index:9999;
}

#popup img{
max-width:95%;
max-height:95%;
border-radius:10px;
}
</style>
</head>
